<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Web3 프라이빗 네트워크</title>

    <script src="https://cdn.jsdelivr.net/npm/web3@1.10.4/dist/web3.min.js"></script>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <p class="subtitle">대학교 블록체인 수업 프로젝트</p>
        <h1>이더리움 프라이빗 네트워크</h1>

        <button id="connectButton" onclick="connectWallet()">
            MetaMask 지갑 연결
        </button>

        <div class="info-panel">
            <p id="status">
                상태 : 연결되지 않음
            </p>

            <p id="account">
                계정 주소 :
            </p>

            <p id="balance">
                잔액 :
            </p>

            <p id="block">
                현재 블록 번호 :
            </p>

            <p id="network">
                네트워크 ID :
            </p>
        </div>

        <form id="transferForm" class="transfer-form">
            <h2>ETH 전송</h2>

            <label for="receiverAddress">받는 주소</label>
            <input
                type="text"
                id="receiverAddress"
                placeholder="0x..."
                autocomplete="off"
                required
            >

            <label for="transferAmount">전송 금액 (ETH)</label>
            <input
                type="number"
                id="transferAmount"
                placeholder="0.1"
                min="0"
                step="0.000000000000000001"
                required
            >

            <button id="sendButton" type="submit">
                ETH 보내기
            </button>
        </form>

        <p id="message" class="message"></p>

        <div class="transaction-box">
            <p>트랜잭션 해시 :</p>
            <p id="txHash">-</p>
        </div>

    </div>

    <script src="app.js?v=4"></script>

</body>

</html>
